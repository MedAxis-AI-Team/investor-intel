services:
  - type: web
    name: investor-intel-api
    runtime: python
    plan: starter
    autoDeploy: true

    buildCommand: python -m pip install -r requirements.txt
    startCommand: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --proxy-headers
      --forwarded-allow-ips '*'
      --workers 1

    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production

      # Secrets (set these in Render; do not commit real values)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_CONNECTION_STRING
        sync: false

      # Optional tuning (defaults are in app/config.py)
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "60"
      - key: LLM_MODEL
        value: "claude-sonnet-4-20250514"
      - key: LLM_MAX_TOKENS
        value: "4096"
